<!DOCTYPE html>
<html>
<head>
  <title>aiplaylist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .app {
      width: 100%;
      max-width: 600px;
    }
    h1 {
      margin-bottom: 15px;
      text-align: center;
      font-size: 2rem;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    input, select {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      background: #1e293b;
      color: white;
      outline: none;
    }
    button {
      padding: 12px 18px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    button:hover {
      background: #2563eb;
    }
    button:disabled {
      background: #334155;
      cursor: not-allowed;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 30px auto;
      border: 4px solid #1e293b;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: none;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    ul {
      list-style: none;
      padding: 0;
      margin-top: 10px;
    }
    li {
      padding: 12px 14px;
      margin-bottom: 8px;
      background: #020617;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    li:hover { background: #020617ee; }
    .now-playing { font-size: 12px; color: #60a5fa; margin-left: 10px; }
    video, audio { width: 100%; border-radius: 16px; margin-top: 12px; background: #020617; }
    footer { text-align: center; margin-top: 25px; font-size: 13px; color: #64748b; }
  </style>
</head>
<body>
  <div class="app">
    <h1>aiplaylist</h1>

    <div class="controls">
      <input id="prompt" placeholder="Describe music" />
      <select id="llm">
        <option value="openai">OpenAI</option>
        <option value="local">Local LLM</option>
      </select>
      <select id="source">
        <option value="youtube">YouTube</option>
        <option value="local">Local MP3s</option>
      </select>
      <button id="btn" onclick="generate()">Generate</button>
    </div>

    <div id="spinner" class="spinner"></div>
    <ul id="playlist"></ul>

    <video id="videoPlayer" controls></video>
    <audio id="audioPlayer" controls style="display:none;"></audio>

    <footer>AI-generated playlists - local + streaming support</footer>
  </div>

  <script>
    const videoPlayer = document.getElementById("videoPlayer");
    const audioPlayer = document.getElementById("audioPlayer");
    const btn = document.getElementById("btn");
    const spinner = document.getElementById("spinner");
    const playlistEl = document.getElementById("playlist");
    const llmSelect = document.getElementById("llm");
    const sourceSelect = document.getElementById("source");
    const promptInput = document.getElementById("prompt");

    let tracks = [];
    let currentIndex = 0;
    let sourceMode = "youtube";

    async function generate() {
      const prompt = promptInput.value.trim();
      if (!prompt) return;

      const mode = llmSelect.value;
      const source = sourceSelect.value;
      sourceMode = source;

      btn.disabled = true;
      spinner.style.display = "block";
      playlistEl.innerHTML = "";
      videoPlayer.style.display = "none";
      audioPlayer.style.display = "none";

      try {
        const res = await fetch("http://localhost:8000/playlist", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt, mode, source })
        });
        const data = await res.json();
        tracks = data.tracks || [];
        currentIndex = 0;
        renderPlaylist();
      } catch (err) {
        console.error(err);
        alert("Failed to generate playlist.");
      }

      spinner.style.display = "none";
      btn.disabled = false;
    }

    function renderPlaylist() {
      playlistEl.innerHTML = "";
      tracks.forEach((track, index) => {
        const li = document.createElement("li");
        const title = document.createElement("span");
        title.textContent = track.title;
        const tag = document.createElement("span");
        tag.className = "now-playing";
        tag.textContent = index === currentIndex ? "Now playing" : "";
        li.appendChild(title);
        li.appendChild(tag);
        li.onclick = () => playTrack(index);
        playlistEl.appendChild(li);
      });
      if (tracks.length > 0) playTrack(0);
    }

    function playTrack(index) {
      currentIndex = index;
      document.querySelectorAll(".now-playing").forEach((el,i)=> el.textContent = i===index?"Now playing":"");
      const track = tracks[index];

      if (sourceMode === "local") {
        videoPlayer.style.display = "none";
        audioPlayer.style.display = "block";
        audioPlayer.src = track.url;
        audioPlayer.load();
        audioPlayer.play();
      } else {
        videoPlayer.style.display = "block";
        audioPlayer.style.display = "none";
        videoPlayer.src = track.url;
        videoPlayer.load();
        videoPlayer.play();
      }
    }

    videoPlayer.addEventListener("ended", () => { if (currentIndex + 1 < tracks.length) playTrack(currentIndex + 1); });
    audioPlayer.addEventListener("ended", () => { if (currentIndex + 1 < tracks.length) playTrack(currentIndex + 1); });
  </script>
</body>
</html>
